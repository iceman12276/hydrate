# template-source: ~/.claude/references/ci-template.yml
# Adapted for a pnpm + Turborepo TypeScript monorepo (no Python/Postgres/Vault).
# Layer 1 (per-service): the `gates` job — Turbo runs build/lint/typecheck/test
#   across every workspace package (web, mobile, shared; desktop JS glue).
# Layer 2 (security gate): `security-gate` — semgrep ci + gitleaks + test-quality.
# Layer 3 (cross-service E2E): Playwright web E2E + Maestro mobile land in M9
#   (template-exception: no E2E tests exist yet; this job is added with them).
#
# pnpm is provisioned via corepack (bundled with Node) so the workflow uses only
# first-party actions/* — no third-party action to pin to a commit SHA.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: build · lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (provides pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Build · lint · typecheck · test
        run: pnpm turbo run build lint typecheck test

  security-gate:
    name: Deterministic Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep CI (SAST + supply chain)
        run: pip install semgrep && semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Secret scanning (gitleaks)
        run: gitleaks detect --source . --no-banner --exit-code 1

      - name: Test quality — no skipped tests (TypeScript)
        run: |
          echo "Checking for xit/xdescribe/.skip/.only in test files..."
          if grep -rn '\bxit\b\|\bxdescribe\b\|\bfit\b\|\bfdescribe\b\|test\.skip\|it\.skip\|describe\.skip\|test\.only\|it\.only\|describe\.only' \
            --include='*.test.ts' --include='*.test.tsx' packages/ apps/ 2>/dev/null; then
            echo "Found skipped or focused tests — remove before merge"
            exit 1
          fi
          echo "No skipped/focused tests found"
